services:
  - type: web
    name: fightcrewapp-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    # Only redeploy the backend when something that affects it actually changes.
    # Without this, every push to main (including web/landing/mobile/docs-only
    # commits) restarts the backend. Each restart is a ~30-90s downtime window,
    # and a token refresh that lands in that window logs the user out. On a
    # heavy push day (~40 web commits on 2026-05-28) that meant repeated
    # logouts for everyone. See docs/daily/2026-05-28.md.
    buildFilter:
      ignoredPaths:
        - "packages/web/**"
        - "packages/landing/**"
        - "packages/mobile/**"
        - "docs/**"
        - "archive/**"
        - "**/*.md"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SKIP_EMAIL_VERIFICATION
        sync: false
