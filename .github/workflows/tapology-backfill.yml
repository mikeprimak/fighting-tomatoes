name: Tapology Results Backfill

on:
  # NOTE: the daily schedule is DISABLED. Tapology blocks GitHub Actions IP
  # ranges (HTTP 403 on every fetch), so this job was a silent no-op here —
  # it scraped nothing yet exited 0 ("success"). The daily backfill now runs
  # as a cron on the Hetzner VPS (unblocked residential IP, same box as the
  # live tracker): `node dist/scripts/backfillTapologyResults.js`. This
  # workflow is kept for manual dispatch only (e.g. a one-off if the VPS is
  # down and you trigger from a machine whose IP Tapology allows). See
  # docs/daily/2026-05-29.md.
  # schedule:
  #   - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      window_days:
        description: 'Lookback window in days (default 7)'
        required: false
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Generate Prisma client
        run: |
          cd packages/backend
          npx prisma generate

      - name: Build TypeScript
        run: |
          cd packages/backend
          pnpm build

      - name: Run Tapology Results Backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
          BACKFILL_WINDOW_DAYS: ${{ github.event.inputs.window_days || '7' }}
          NODE_ENV: production
        run: |
          cd packages/backend
          node dist/scripts/backfillTapologyResults.js

      - name: Report failure
        if: failure()
        run: |
          echo "Tapology Backfill workflow FAILED at $(date)"
          curl -s "https://fightcrewapp-backend.onrender.com/api/admin/test-alert?key=fightcrew-test-2026&type=backfill&org=TAPOLOGY" || echo "Failed to send alert"
