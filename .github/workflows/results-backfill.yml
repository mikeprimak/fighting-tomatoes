name: Results Backfill (Phase 2 orchestrator)
# Daily orchestrator that fills in missing fight results on already-completed
# events the live tracker missed. Dispatches: ufc, bkfc, onefc, oktagon,
# matchroom, pfl.
# Tapology family is handled by tapology-backfill.yml (older Phase 1 job).

on:
  schedule:
    # Daily at 10:00 UTC (1 hour after tapology-backfill.yml at 09:00 UTC, so
    # the two jobs don't fight for Render DB connections or Puppeteer memory).
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      window_days:
        description: 'Lookback window in days (default 14)'
        required: false
        type: string
      orgs:
        description: 'CSV filter of scraperType values, e.g. "ufc" (default: all)'
        required: false
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Generate Prisma client
        run: |
          cd packages/backend
          npx prisma generate

      - name: Build TypeScript
        run: |
          cd packages/backend
          pnpm build

      - name: Install Chromium for Puppeteer
        run: |
          cd packages/backend
          npx puppeteer browsers install chrome

      - name: Run Results Backfill orchestrator
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKFILL_WINDOW_DAYS: ${{ github.event.inputs.window_days || '14' }}
          BACKFILL_ORGS: ${{ github.event.inputs.orgs || '' }}
          NODE_ENV: production
        run: |
          cd packages/backend
          node dist/scripts/backfillResults.js

      - name: Report failure
        if: failure()
        run: |
          echo "Results Backfill workflow FAILED at $(date)"
          curl -s "https://fightcrewapp-backend.onrender.com/api/admin/test-alert?key=fightcrew-test-2026&type=backfill&org=ORCHESTRATOR" || echo "Failed to send alert"
