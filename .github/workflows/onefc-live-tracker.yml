name: ONE FC Live Tracker

on:
  # Triggered by Render backend (eventLifecycle.ts) every 5 min during live ONE FC events.
  # Uses Puppeteer to scrape onefc.com event pages for fight results.
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Event ID (optional - leave empty for auto-detection)'
        required: false
        type: string
      onefc_event_url:
        description: 'ONE FC event page URL (e.g. https://www.onefc.com/events/onefightnight41/)'
        required: false
        type: string

jobs:
  track-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Generate Prisma client
        run: |
          cd packages/backend
          npx prisma generate

      - name: Build live tracker
        run: |
          cd packages/backend
          # Build only the live-tracker files via a dedicated tsconfig that
          # skips the broken routes/auth files and adds DOM lib for the
          # page.evaluate() blocks in the scraper. Full pnpm build has been
          # broken since March 2026 due to unrelated route-level type errors.
          npx tsc --project tsconfig.tracker.json

      - name: Install Chromium for Puppeteer
        run: |
          cd packages/backend
          npx puppeteer browsers install chrome

      - name: Run ONE FC Live Tracker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EVENT_ID: ${{ github.event.inputs.event_id }}
          ONEFC_EVENT_URL: ${{ github.event.inputs.onefc_event_url }}
          NODE_ENV: production
        run: |
          cd packages/backend
          echo "Starting ONE FC Live Tracker..."
          node dist/scripts/runOneFCLiveTracker.js
          echo "Live tracker finished."

      - name: Report failure
        if: failure()
        run: |
          echo "ONE FC Live Tracker workflow FAILED at $(date)"
          curl -s "https://fightcrewapp-backend.onrender.com/api/admin/test-alert?key=fightcrew-test-2026&type=live_tracker&org=ONE_FC" || echo "Failed to send alert"
