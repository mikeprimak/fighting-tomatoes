name: Post-Fight Enrichment

# Daily job that scans COMPLETED events ~5 days past their date, fetches
# post-event recap editorial, runs the LLM extract, and writes the
# aiPostFight* fields on the matching COMPLETED fights. Sibling to the
# pre-fight Fight Enrichment job. No admin review inbox — confidence floor
# + grounding URLs are the audit trail.
#
# See docs/areas/ai-enrichment.md (Phase 6) for the cadence rationale.

on:
  schedule:
    # 16:00 UTC daily — offset from the pre-fight job (14:00 UTC) so the two
    # enrichment crons never contend for the same UFC.com Puppeteer window.
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute matches but do not write (1 to enable)."
        required: false
        default: ""
      only_event_id:
        description: "Restrict to a single event id (manual ad-hoc)."
        required: false
        default: ""
      ignore_window:
        description: "Enrich even outside the T+5d / max-age window (1 to enable)."
        required: false
        default: ""
      max_events:
        description: "Safety cap on events per run (default 25)."
        required: false
        default: ""
      min_days_after:
        description: "Days after the event before enriching (default 5)."
        required: false
        default: ""
      max_age_days:
        description: "Ceiling on event age in days (default 45)."
        required: false
        default: ""

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install deps
        run: |
          cd packages/backend
          pnpm install
          npx prisma generate

      - name: Install Chromium for Puppeteer (UFC.com fetch)
        run: |
          cd packages/backend
          npx puppeteer browsers install chrome

      - name: Run post-fight enrichment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          POST_FIGHT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          POST_FIGHT_ONLY_EVENT_ID: ${{ github.event.inputs.only_event_id }}
          POST_FIGHT_IGNORE_WINDOW: ${{ github.event.inputs.ignore_window }}
          POST_FIGHT_MAX_EVENTS: ${{ github.event.inputs.max_events }}
          POST_FIGHT_MIN_DAYS_AFTER: ${{ github.event.inputs.min_days_after }}
          POST_FIGHT_MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days }}
        run: |
          cd packages/backend
          npx ts-node --transpile-only scripts/run-post-fight-enrichment.ts

      - name: Report failure
        if: failure()
        run: |
          curl -s "https://fightcrewapp-backend.onrender.com/api/admin/test-alert?key=fightcrew-test-2026&type=post-fight-enrichment&org=fights" || true
