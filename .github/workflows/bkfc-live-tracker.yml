name: BKFC Live Tracker

on:
  # Triggered by Render backend (eventLifecycle.ts) every 5 min during live BKFC events.
  # Uses Puppeteer to scrape bkfc.com event pages for fight results.
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Event ID (optional - leave empty for auto-detection)'
        required: false
        type: string
      bkfc_event_url:
        description: 'BKFC event page URL (e.g. https://www.bkfc.com/events/bkfc-fight-night-newcastle-2)'
        required: false
        type: string

jobs:
  track-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Generate Prisma client
        run: |
          cd packages/backend
          npx prisma generate

      - name: Build TypeScript
        run: |
          cd packages/backend
          pnpm build

      - name: Install Chromium for Puppeteer
        run: |
          cd packages/backend
          npx puppeteer browsers install chrome

      - name: Run BKFC Live Tracker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EVENT_ID: ${{ github.event.inputs.event_id }}
          BKFC_EVENT_URL: ${{ github.event.inputs.bkfc_event_url }}
          NODE_ENV: production
        run: |
          cd packages/backend
          echo "Starting BKFC Live Tracker..."
          node dist/scripts/runBKFCLiveTracker.js
          echo "Live tracker finished."

      - name: Report failure
        if: failure()
        run: |
          echo "BKFC Live Tracker workflow FAILED at $(date)"
          curl -s "https://fightcrewapp-backend.onrender.com/api/admin/test-alert?key=fightcrew-test-2026&type=live_tracker&org=BKFC" || echo "Failed to send alert"
