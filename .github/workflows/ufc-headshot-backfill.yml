name: UFC Headshot Backfill
# Re-fetches fighter headshots from ufc.com for rows with missing or broken
# (dead fightingtomatoes.com / raw ufc.com / mis-hosted r2.dev) profileImage.
# Runs from GitHub Actions IPs so we don't get CDN-blocked like local runs.
#
# Manual-only — this is a one-shot backfill, not a daily job. Re-trigger
# from the Actions tab if more fighters surface as missing in future.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max fighters to process (blank = no limit)'
        required: false
        default: ''
      rate_limit_ms:
        description: 'Sleep between fetches (ms)'
        required: false
        default: '750'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Generate Prisma client
        run: |
          cd packages/backend
          npx prisma generate

      - name: Install Chromium for Puppeteer
        run: |
          cd packages/backend
          npx puppeteer browsers install chrome

      - name: Run headshot backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          BACKFILL_HEADSHOT_LIMIT: ${{ inputs.limit }}
          BACKFILL_HEADSHOT_RATE_MS: ${{ inputs.rate_limit_ms }}
        run: |
          cd packages/backend
          pnpm tsx src/scripts/backfillUFCHeadshots.ts

      - name: Report success
        if: success()
        run: |
          echo "UFC headshot backfill completed at $(date)"

      - name: Report failure
        if: failure()
        run: |
          echo "UFC headshot backfill FAILED at $(date)"
