name: Tapology Live Tracker

on:
  # Triggered by eventLifecycle.ts or manually via curl/GitHub UI
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Event ID (optional - leave empty for auto-detection)'
        required: false
        type: string
      tapology_url:
        description: 'Tapology event URL (optional - auto-discovered from hub page)'
        required: false
        type: string

jobs:
  track-live:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Generate Prisma client
        run: |
          cd packages/backend
          npx prisma generate

      - name: Build TypeScript
        run: |
          cd packages/backend
          pnpm build

      - name: Run Tapology Live Tracker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EVENT_ID: ${{ github.event.inputs.event_id }}
          TAPOLOGY_URL: ${{ github.event.inputs.tapology_url }}
          NODE_ENV: production
        run: |
          cd packages/backend
          echo "Starting Tapology Live Tracker..."
          node dist/scripts/runTapologyLiveTracker.js
          echo "Live tracker finished."

      - name: Report failure
        if: failure()
        run: |
          echo "Tapology Live Tracker workflow FAILED at $(date)"
          curl -s "https://fightcrewapp-backend.onrender.com/api/admin/test-alert?key=fightcrew-test-2026&type=live_tracker&org=TAPOLOGY" || echo "Failed to send alert"
